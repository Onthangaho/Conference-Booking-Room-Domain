name: Booking Next CI

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'booking-next/**'
      - '.github/workflows/booking-next-ci.yml'
  pull_request:
    paths:
      - 'booking-next/**'
      - '.github/workflows/booking-next-ci.yml'

jobs:
  booking-next:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: booking-next

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: booking-next/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run strict lint
        run: npm run lint:strict

      - name: Run production build
        run: npm run build
